# ── Datasource ───────────────────────────────────────────────
# When launched by Electron, app.data.dir is passed as -Dapp.data.dir=<userDataPath>
# Falls back to ./data for direct backend dev mode
app.data.dir=${app.data.dir:./data}
spring.datasource.url=jdbc:h2:file:${app.data.dir}/securityrisk;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ── Flyway ───────────────────────────────────────────────────
spring.flyway.enabled=false

# ── Server ───────────────────────────────────────────────────
# When launched by Electron, server.port is passed as -Dserver.port=<dynamicPort>
# Falls back to 8080 for standard dev mode
server.port=${server.port:8080}

# ── File Storage ──────────────────────────────────────────────
isra.upload.dir=${app.data.dir}/attachments

# ── Multipart ────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=1024MB
spring.servlet.multipart.max-request-size=1024MB
spring.servlet.multipart.enabled=true

# ── Misc ──────────────────────────────────────────────────────
spring.main.allow-bean-definition-overriding=true
security.basic.enabled=false
management.security.enabled=false

# ── CORS ─────────────────────────────────────────────────────
# Allow both dev Angular server and Electron's file:// origin
isra.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:4201}

# ── AI Configuration ──────────────────────────────────────────
isra.ai.provider=gemini
isra.ai.api-key=${GEMINI_KEY}
isra.ai.model=gemini-3.1-flash-lite
isra.ai.base-url=https://generativelanguage.googleapis.com
isra.ai.health-check-url=https://generativelanguage.googleapis.com

