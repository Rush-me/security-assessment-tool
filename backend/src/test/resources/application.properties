# ── Test Datasource Configuration ──────────────────────────────
app.data.dir=./data-test
spring.datasource.url=jdbc:h2:mem:securityrisk;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ── File Storage ──────────────────────────────────────────────
isra.upload.dir=./data-test/attachments

# ── Server ───────────────────────────────────────────────────
server.port=8080

# ── AI Configuration ──────────────────────────────────────────
isra.ai.provider=gemini
isra.ai.api-key=test-api-key
isra.ai.model=gemini-3.1-flash-lite
isra.ai.base-url=http://localhost:8089
isra.ai.health-check-url=http://localhost:8089

# ── CORS ─────────────────────────────────────────────────────
isra.cors.allowed-origins=http://localhost:4200,http://localhost:4201
