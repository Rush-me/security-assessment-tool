<div class="login-wrapper">
  <mat-card class="login-card">
    <div class="card-header">
      <div class="logo-wrapper">
        <mat-icon class="logo-icon">security</mat-icon>
      </div>
      <h1 class="card-title gradient-text">Thales ISRA</h1>
      <p class="card-subtitle">Information Security Risk Assessment Tool</p>
    </div>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <mat-form-field appearance="outline" class="form-field">
          <mat-label>Username</mat-label>
          <input matInput formControlName="username" placeholder="Enter username" autocomplete="username">
          <mat-icon matSuffix>person</mat-icon>
          <mat-error *ngIf="loginForm.get('username')?.hasError('required')">
            Username is required
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="form-field">
          <mat-label>Password</mat-label>
          <input matInput [type]="hidePassword() ? 'password' : 'text'" formControlName="password" placeholder="Enter password" autocomplete="current-password">
          <button mat-icon-button matSuffix (click)="hidePassword.set(!hidePassword())" type="button" [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hidePassword()">
            <mat-icon>{{hidePassword() ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
            Password is required
          </mat-error>
          <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">
            Password must be at least 4 characters long
          </mat-error>
        </mat-form-field>

        <button mat-raised-button class="neon-btn submit-btn" type="submit" [disabled]="loginForm.invalid || isLoading()">
          <span *ngIf="!isLoading()">Sign In</span>
          <span *ngIf="isLoading()">Authenticating...</span>
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions class="card-actions">
      <span class="action-text">Don't have an account?</span>
      <a mat-button color="primary" routerLink="/register" class="register-link">Sign Up</a>
    </mat-card-actions>
  </mat-card>
</div>
